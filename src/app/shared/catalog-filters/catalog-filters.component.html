<div class="filters-panel surface-card">
  <div class="filters-panel__header">
    <div>
      <p class="eyebrow">Refine the catalog</p>
    </div>
    <button
      type="button"
      class="secondary outline"
      (click)="reset()"
      [disabled]="!hasActiveFilters"
    >Clear filters</button>
  </div>
  
  <label>
    <span>Search</span>
    <input
      type="search"
      placeholder="Search by title, material, or description"
      [ngModel]="draftFilters.search"
      (ngModelChange)="updateFilters({ search: $event })"
    >
  </label>

  <div class="filters-grid">

    <label>
      <span>Category</span>
      <select
        [ngModel]="draftFilters.category"
        (ngModelChange)="updateFilters({ category: $event })"
      >
        <option value="all">All categories</option>
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </label>

    <label>
      <span>Material</span>
      <select
        [ngModel]="draftFilters.material"
        (ngModelChange)="updateFilters({ material: $event })"
      >
        <option value="all">All materials</option>
        <option *ngFor="let material of materials" [value]="material">{{ material }}</option>
      </select>
    </label>

    <label>
      <span>Marketplace</span>
      <select
        [ngModel]="draftFilters.marketplace"
        (ngModelChange)="updateFilters({ marketplace: $event })"
      >
        <option *ngFor="let option of marketplaceOptions" [value]="option.value">{{ option.label }}</option>
      </select>
    </label>
  </div>
</div>
