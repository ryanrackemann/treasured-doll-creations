name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: ng build --configuration production --base-href /treasured-doll-creations/

      - name: Add 404 fallback
        run: cp dist/treasured-doll-creations/index.html dist/treasured-doll-creations/404.html

      - name: Add CNAME
        run: echo "www.ryanrackemann.com" > dist/treasured-doll-creations/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/treasured-doll-creations